# Render blueprint — auto-deploys the Blood in the Sand match server on every
# push to master. One-time setup: Render dashboard → New → Blueprint → connect
# this repo; the resulting URL (e.g. blood-in-the-sand.onrender.com) is what
# the app's EXPO_PUBLIC_DEFAULT_SERVER should point at.
services:
  - type: web
    name: blood-in-the-sand
    runtime: docker
    dockerfilePath: apps/blood-in-the-sand-server/Dockerfile
    dockerContext: .
    region: frankfurt # closest to the UK; move if your ping says otherwise
    # free spins down after ~15 idle minutes (≈1 min cold start on next
    # connect); the in-match 30Hz WebSocket traffic keeps it awake once up.
    # Bump to `starter` if the cold starts get annoying.
    plan: free
    autoDeploy: true
    healthCheckPath: /
